services:
  - type: web
    name: chatbot-ai-proxy
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://chatbot.odoo.com
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: ODOO_URL
        sync: false
      - key: ODOO_API_KEY
        sync: false
